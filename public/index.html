<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyntaxAI — Interactive Coding Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
</head>
<body>

  <!-- ═══ TOPBAR ═══ -->
  <header class="topbar">
    <div class="logo">
      <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
        <path d="M14 4l-4 16"></path>
      </svg>
      <span class="logo-text">SyntaxAI</span>
    </div>
    
    <div class="topbar-center" id="status-bar">
      <span class="status-badge" id="status-lang">JavaScript</span>
      <span class="status-badge outline" id="status-diff">Başlangıç</span>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" id="reset-btn" title="Görevi Sıfırla">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
      <button class="icon-btn" id="settings-btn" title="Ayarlar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══ SPLIT VIEW ═══ -->
  <main class="split-view">
    
    <!-- LEFT: TASK PANEL -->
    <div class="pane task-pane">
      <div class="task-scroll">
        
        <!-- MASCOT DIALOG (Task) -->
        <div class="mascot-dialog">
          <div class="mascot-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1v-1.27a2 2 0 0 1-1-1.73 2 2 0 0 1 2-2z"></path>
              <path d="M9 14h.01"></path><path d="M15 14h.01"></path>
              <path d="M10 18h4"></path>
            </svg>
          </div>
          <div class="mascot-bubble">
            <div class="bubble-header">SyntaxAI</div>
            <div id="task-text" class="bubble-content">
              Sisteme hoş geldin. Üst menüden ayarları yapılandırıp "Görevi Başlat" butonuna tıklayarak eğitimine başlayabilirsin.
            </div>
          </div>
        </div>

        <!-- MASCOT DIALOG (Feedback) -->
        <div class="mascot-dialog" id="feedback-box" style="display: none;">
          <div class="mascot-avatar secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
              <path d="M12 8v4" />
              <path d="M12 16h.01" />
            </svg>
          </div>
          <div class="mascot-bubble feedback-bubble">
            <div class="bubble-header" id="feedback-title">Geri Bildirim</div>
            <div id="feedback-text" class="bubble-content"></div>
          </div>
        </div>

      </div>

      <!-- Control Bar -->
      <div class="control-bar">
        <button id="check-code-btn" class="btn-check">
          Görevi Başlat
        </button>
      </div>
    </div>

    <!-- RIGHT: EDITOR -->
    <div class="pane editor-pane">
      <div class="pane-header">
        <div class="pane-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          <span id="file-name">index.js</span>
        </div>
      </div>
      <div id="monaco-container" class="monaco-container"></div>
    </div>
  </main>

  <!-- ═══ SETTINGS MODAL ═══ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Ayarlar</h2>
        <button class="icon-btn" id="modal-close">✖</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Sağlayıcı</label>
          <select id="provider-select" class="bw-input">
            <option value="Gemini">Gemini</option>
            <option value="OpenAI">OpenAI</option>
            <option value="Anthropic">Anthropic</option>
          </select>
        </div>
        <div class="form-group">
          <label>Model Seçimi</label>
          <div class="row">
            <select id="model-select" class="bw-input"></select>
            <button class="btn-outline" id="fetch-models-btn">Yenile</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Programlama Dili</label>
            <select id="lang-select" class="bw-input">
              <option value="JavaScript">JavaScript</option>
              <option value="Python">Python</option>
              <option value="TypeScript">TypeScript</option>
              <option value="Node.js">Node.js</option>
              <option value="React">React</option>
              <option value="HTML">HTML</option>
              <option value="CSS">CSS</option>
              <option value="Java">Java</option>
              <option value="C++">C++</option>
              <option value="C#">C#</option>
              <option value="Go">Go</option>
              <option value="Rust">Rust</option>
            </select>
          </div>
          <div class="form-group">
            <label>Zorluk Seviyesi</label>
            <select id="diff-select" class="bw-input">
              <option value="Başlangıç">Başlangıç</option>
              <option value="Orta">Orta</option>
              <option value="İleri">İleri</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-check" id="save-settings-btn" style="width:100%">Kaydet</button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay" style="display: none;">
    <div class="bw-spinner"></div>
    <div class="loading-text">Yapay Zeka Değerlendiriyor...</div>
  </div>

  <div class="toasts" id="toasts"></div>

  <script src="/js/app.js"></script>
</body>
</html>
